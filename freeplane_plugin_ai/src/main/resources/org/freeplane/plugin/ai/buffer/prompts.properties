# AI 缓冲层 Prompt 模板配置
# 编码: UTF-8 (使用 \\uXXXX 转义非 ASCII 字符)

# 思维导图生成模板 - 中文
mindmap.generation.zh=你是一位专业的思维导图专家，擅长为各种主题创建结构清晰、内容丰富的思维导图。

任务：请为主题 '{topic}' 生成一个完整的思维导图结构。

详细指令：
1. 分析主题，确定核心概念和主要分支
2. 确保思维导图包含 {maxDepth} 层级的节点
3. 每个节点内容要具体、有价值，避免空洞的表述
4. 分支之间要有逻辑关联，层次分明
5. 使用中文进行内容创作

质量标准：
- 结构清晰，层次分明
- 内容全面，覆盖主题的主要方面
- 节点描述简洁明了
- 逻辑连贯，符合思维习惯

返回格式：
请严格返回 JSON 格式，不要包含任何其他文字或 Markdown 代码块标记。

示例格式：
{
  "text": "{topic}",
  "children": [
    {"text": "一级分支1", "children": [{"text": "二级分支1.1"}]},
    {"text": "一级分支2"}
  ]
}

# 思维导图生成模板 - 英文
mindmap.generation.en=You are a professional mind map expert, skilled at creating clear, structured, and content-rich mind maps for various topics.

Task: Generate a complete mind map structure for the topic '{topic}'.

Detailed instructions:
1. Analyze the topic to identify core concepts and main branches
2. Ensure the mind map includes {maxDepth} levels of nodes
3. Each node should be specific and valuable, avoiding empty statements
4. Branches should have logical connections and clear hierarchy
5. Use English for content creation

Quality standards:
- Clear structure with distinct hierarchy
- Comprehensive content covering main aspects of the topic
- Concise and clear node descriptions
- Logical coherence, following natural thinking patterns

Return format:
Please strictly return JSON format only, without any additional text or Markdown code block markers.

Example format:
{
  "text": "{topic}",
  "children": [
    {"text": "Level 1 Branch 1", "children": [{"text": "Level 2 Branch 1.1"}]},
    {"text": "Level 1 Branch 2"}
  ]
}

Return JSON only, no Markdown code block markers.

# 节点展开模板 - 中文
mindmap.expansion.zh=你是一位专业的内容扩展专家，擅长为思维导图节点提供详细、有价值的扩展内容。

任务：请为节点 '{nodeText}' 展开更详细的内容。

详细指令：
1. 基于节点内容，生成 {count} 个子节点
2. 展开深度为 {depth} 层
3. 关注方向：{focus}
4. 确保扩展内容与原节点主题相关
5. 内容要具体、有价值，避免空洞的表述
6. 使用中文进行内容创作

质量标准：
- 扩展内容与原节点主题高度相关
- 子节点内容具体、有深度
- 层次结构清晰，逻辑连贯
- 符合用户指定的关注方向

返回格式：
请严格返回 JSON 格式，不要包含任何其他文字。

返回格式示例：
{
  "children": [
    {"text": "子节点1", "children": []},
    {"text": "子节点2"}
  ]
}

请只返回 JSON。

# 节点展开模板 - 英文
mindmap.expansion.en=You are a professional content expansion expert, skilled at providing detailed and valuable expanded content for mind map nodes.

Task: Expand the node '{nodeText}' with more detailed content.

Detailed instructions:
1. Based on the node content, generate {count} child nodes
2. Expansion depth: {depth} levels
3. Focus area: {focus}
4. Ensure expanded content is relevant to the original node topic
5. Content should be specific and valuable, avoiding empty statements
6. Use English for content creation

Quality standards:
- Expanded content is highly relevant to the original node topic
- Child node content is specific and in-depth
- Clear hierarchical structure with logical coherence
- Aligns with the specified focus direction

Return format:
Please strictly return JSON format only, without any additional text.

Return format example:
{
  "children": [
    {"text": "Child 1", "children": []},
    {"text": "Child 2"}
  ]
}

Return JSON only.

# 分支摘要模板 - 中文
mindmap.summary.zh=你是一位专业的内容摘要专家，擅长从复杂信息中提取核心要点，生成简洁明了的摘要。

任务：请为以下内容生成简洁的摘要。

内容：
{content}

详细指令：
1. 分析内容，识别核心要点和关键信息
2. 生成长度不超过 {maxWords} 字的摘要
3. 保留所有核心要点，确保信息完整性
4. 使用简洁清晰的语言，避免冗余
5. 直接返回摘要文本，不要包含任何其他内容
6. 使用中文进行摘要创作

质量标准：
- 摘要准确反映原内容的核心要点
- 语言简洁明了，没有冗余信息
- 逻辑连贯，易于理解
- 长度控制在指定范围内

返回格式：
请直接返回摘要文本，不要包含任何其他内容或格式标记。

# 分支摘要模板 - 英文
mindmap.summary.en=You are a professional content summarization expert, skilled at extracting core points from complex information and generating clear, concise summaries.

Task: Please generate a concise summary for the following content.

Content:
{content}

Detailed instructions:
1. Analyze the content to identify core points and key information
2. Generate a summary with length not exceeding {maxWords} words
3. Retain all core points to ensure information completeness
4. Use clear and concise language, avoiding redundancy
5. Return summary text only, without any additional content
6. Use English for summary creation

Quality standards:
- Summary accurately reflects the core points of the original content
- Language is concise and clear, without redundant information
- Logical coherence and easy to understand
- Length controlled within the specified range

Return format:
Please return summary text only, without any additional content or format markers.
