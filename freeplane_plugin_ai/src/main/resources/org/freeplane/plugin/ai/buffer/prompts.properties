# AI 缓冲层 Prompt 模板配置
# 编码: UTF-8 (使用 \\uXXXX 转义非 ASCII 字符)

# 思维导图生成模板 - 中文
mindmap.generation.zh=请为主题"{topic}"生成一个完整的思维导图结构，包含 {maxDepth} 层级节点。\n要求：每个节点内容具体有价值，分支之间逻辑关联，使用中文。\n严格返回 JSON 格式，不要包含任何其他文字或 Markdown 代码块标记。\n示例：{"text":"{topic}","children":[{"text":"一级分支1","children":[{"text":"二级分支1.1"}]},{"text":"一级分支2"}]}

# 思维导图生成模板 - 英文
mindmap.generation.en=Generate a complete mind map structure for the topic "{topic}" with {maxDepth} levels of nodes. Each node should be specific and valuable. Return strictly valid JSON only, no markdown, no explanation. Example: {"text":"{topic}","children":[{"text":"Branch 1","children":[{"text":"Sub 1.1"}]},{"text":"Branch 2"}]}

# 节点展开模板 - 中文
mindmap.expansion.zh=请为节点"{nodeText}"生成 {count} 个子节点，展开深度 {depth} 层，关注方向：{focus}。\n要求：内容与节点主题高度相关，具体有价值，使用中文。\n严格返回 JSON 格式，不要包含任何其他文字或 Markdown 代码块标记。\n示例：{"children":[{"text":"子节点1","children":[{"text":"子子节点1.1"}]},{"text":"子节点2"}]}

# 节点展开模板 - 英文
mindmap.expansion.en=Generate {count} child nodes for the node "{nodeText}" with depth {depth}, focus: {focus}. Return strictly valid JSON with a "children" array only, no markdown, no explanation. Example: {"children":[{"text":"Child 1","children":[{"text":"Sub 1.1"}]},{"text":"Child 2"}]}

# 分支摘要模板 - 中文
mindmap.summary.zh=请对以下思维导图分支内容进行摘要，长度不超过 {maxWords} 字，使用中文，直接返回摘要文本，不要任何格式标记：\n\n{content}

# 分支摘要模板 - 英文
mindmap.summary.en=Summarize the following mind map branch content in no more than {maxWords} words. Return only the summary text, no extra content or format markers:\n\n{content}

