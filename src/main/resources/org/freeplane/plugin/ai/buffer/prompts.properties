# AI 缓冲层 Prompt 模板配置
# 编码: UTF-8 (使用 \\uXXXX 转义非 ASCII 字符)

# 思维导图生成模板 - 中文
mindmap.generation.zh=请为'{topic}'生成一个完整的思维导图结构。

要求：
1. 包含 {maxDepth} 层级的节点
2. 每个节点内容具体、有价值
3. 返回严格的 JSON 格式，不要其他文字
4. 使用中文

返回格式示例：
{
  "text": "{topic}",
  "children": [
    {"text": "一级分支1", "children": [{"text": "二级分支1.1"}]},
    {"text": "一级分支2"}
  ]
}

请只返回 JSON，不要 Markdown 代码块标记。

# 思维导图生成模板 - 英文
mindmap.generation.en=Generate a complete mind map structure for '{topic}'.

Requirements:
1. Include {maxDepth} levels of nodes
2. Each node should be specific and valuable
3. Return strict JSON format only, no additional text
4. Use English

Example format:
{
  "text": "{topic}",
  "children": [
    {"text": "Level 1 Branch 1", "children": [{"text": "Level 2 Branch 1.1"}]},
    {"text": "Level 1 Branch 2"}
  ]
}

Return JSON only, no Markdown code block markers.

# 节点展开模板 - 中文
mindmap.expansion.zh=请为节点'{nodeText}'展开更详细的内容。

要求：
1. 生成 {count} 个子节点
2. 深度为 {depth} 层
3. 关注方向：{focus}
4. 返回严格的 JSON 格式

返回格式：
{
  "children": [
    {"text": "子节点1", "children": []},
    {"text": "子节点2"}
  ]
}

请只返回 JSON。

# 节点展开模板 - 英文
mindmap.expansion.en=Expand the node '{nodeText}' with more detailed content.

Requirements:
1. Generate {count} child nodes
2. Depth: {depth} levels
3. Focus area: {focus}
4. Return strict JSON format

Return format:
{
  "children": [
    {"text": "Child 1", "children": []},
    {"text": "Child 2"}
  ]
}

Return JSON only.

# 分支摘要模板 - 中文
mindmap.summary.zh=请为以下内容生成简洁的摘要：

{content}

要求：
1. 摘要长度不超过 {maxWords} 字
2. 保留核心要点
3. 使用简洁清晰的语言
4. 直接返回摘要文本，不要其他内容

# 分支摘要模板 - 英文
mindmap.summary.en=Please generate a concise summary for the following content:

{content}

Requirements:
1. Summary length should not exceed {maxWords} words
2. Keep core key points
3. Use clear and concise language
4. Return summary text only, no additional content
