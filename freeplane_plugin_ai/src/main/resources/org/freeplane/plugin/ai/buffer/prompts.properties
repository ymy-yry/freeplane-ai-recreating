# AI 缓冲层 Prompt 模板配置
# 编码: UTF-8，可直接写中文（加载方式已是 InputStreamReader(UTF-8)）

# 思维导图生成模板 - 中文
mindmap.generation.zh=你是一位专业的思维导图专家。\n你的任务：为主题"{topic}"生成一个结构完整、内容丰富的思维导图。\n要求：\n1. 共 {maxDepth} 层节点，每层 3~5 个节点\n2. 节点文字简洁（5~15字），内容具体有价值\n3. 同级分支逻辑互补、不重复\n4. 全部使用中文\n输出规则：严格返回合法 JSON，不含说明文字、markdown 标记或注释。根节点含 text 和 children 字段，children 为数组，每项含 text 和可选 children。\n示例：{"text":"{topic}","children":[{"text":"核心分支A","children":[{"text":"要点A1"},{"text":"要点A2"}]},{"text":"核心分支B","children":[{"text":"要点B1"}]},{"text":"核心分支C"}]}

# 思维导图生成模板 - 英文
mindmap.generation.en=You are a professional mind map expert.\nTask: Generate a complete mind map for the topic "{topic}".\nRequirements:\n1. {maxDepth} levels of nodes, 3-5 nodes per level\n2. Node text concise (5-15 words) and specific\n3. Sibling nodes logically complementary and non-redundant\nOutput rules: Return strictly valid JSON only, no markdown, no explanation. Root has text and children fields; children is array where each item has text and optional children.\nExample: {"text":"{topic}","children":[{"text":"Branch A","children":[{"text":"Point A1"},{"text":"Point A2"}]},{"text":"Branch B","children":[{"text":"Point B1"}]},{"text":"Branch C"}]}

# 节点展开模板 - 中文
mindmap.expansion.zh=你是一位专业的思维导图专家。\n你的任务：对节点"{nodeText}"进行展开，生成子节点。\n展开参数：子节点数量 {count} 个，展开深度 {depth} 层，关注方向：{focus}。\n要求：\n1. 子节点内容必须与父节点"{nodeText}"高度相关\n2. 节点文字简洁（5~15字），具体有价值\n3. 同级节点逻辑互补、不重复\n4. 全部使用中文\n输出规则：严格返回合法 JSON，不含说明文字、markdown 标记或注释。根字段为 children 数组，每项含 text 和可选 children。\n示例：{"children":[{"text":"子节点A","children":[{"text":"子子节点A1"},{"text":"子子节点A2"}]},{"text":"子节点B"},{"text":"子节点C"}]}

# 节点展开模板 - 英文
mindmap.expansion.en=You are a professional mind map expert.\nTask: Expand the node "{nodeText}" by generating child nodes.\nParameters: {count} child nodes, depth {depth} levels, focus: {focus}.\nRequirements:\n1. All child nodes must be closely related to parent "{nodeText}"\n2. Node text concise (5-15 words) and specific\n3. Sibling nodes logically complementary and non-redundant\nOutput rules: Return strictly valid JSON only, no markdown, no explanation. Root field is children array; each item has text and optional children.\nExample: {"children":[{"text":"Child A","children":[{"text":"Sub A1"},{"text":"Sub A2"}]},{"text":"Child B"},{"text":"Child C"}]}

# 分支摘要模板 - 中文
mindmap.summary.zh=你是一位专业的内容分析专家。\n你的任务：对以下思维导图分支内容进行摘要。\n要求：\n1. 摘要长度不超过 {maxWords} 字\n2. 提炼核心观点，语言简洁流畅\n3. 使用中文\n4. 直接返回摘要文本，不要标题、格式标记或前缀说明\n待摘要内容：\n{content}

# 分支摘要模板 - 英文
mindmap.summary.en=You are a professional content analyst.\nTask: Summarize the following mind map branch content.\nRequirements:\n1. No more than {maxWords} words\n2. Extract core insights concisely\n3. Return only the summary text, no title, no format markers, no prefix\nContent to summarize:\n{content}
